---
# ============================================================
# Rôle odoo_role — Déploiement Odoo 13 + PostgreSQL via Docker
# ============================================================

# --- 1. Prérequis système ---
- name: Installer les dépendances système
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present
    update_cache: true

- name: Installer le module Python docker (requis par Ansible)
  ansible.builtin.pip:
    name: docker
    state: present

# --- 2. Installation Docker ---
- name: Ajouter la clé GPG Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
    state: present

- name: Installer Docker Engine + Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Démarrer et activer Docker au boot
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# --- 3. Déploiement Odoo ---
- name: Créer le répertoire de déploiement Odoo
  ansible.builtin.file:
    path: "{{ odoo_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Copier le docker-compose Odoo
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ odoo_deploy_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart odoo

- name: Lancer Odoo + PostgreSQL via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ odoo_deploy_dir }}"
    state: present
    pull: always

# --- 4. Ajout de l'utilisateur ubuntu au groupe docker ---
# Permet à l'utilisateur ubuntu de lancer des commandes docker sans sudo
- name: Ajouter l'utilisateur ubuntu au groupe docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
